<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>HospitalFinder India – Find the Right Care</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,600;0,800;1,300;1,600&family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════════ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #060e1a;
      color: #dde6f5;
      overflow-x: hidden;
      min-height: 100vh
    }

    a {
      text-decoration: none;
      color: inherit
    }

    button {
      cursor: pointer;
      font-family: 'Outfit', sans-serif
    }

    input,
    select {
      font-family: 'Outfit', sans-serif
    }

    :root {
      /* Colors */
      --emerald: #10b981;
      --em-d: #059669;
      --em-xl: #047857;
      --sapphire: #3b82f6;
      --sap-d: #2563eb;
      --amber: #f59e0b;
      --amb-d: #d97706;
      --rose: #f43f5e;
      --rose-d: #e11d48;
      --violet: #8b5cf6;
      --navy: #060e1a;
      --navy2: #0b1728;
      --navy3: #101e30;
      --card: #0e1c2e;
      --card2: #122035;
      --border: rgba(16, 185, 129, .14);
      --border2: rgba(255, 255, 255, .06);
      --text: #dde6f5;
      --muted: #6b87a8;
      --light: #a8c0dc;
      /* Shadows */
      --shadow: 0 8px 40px rgba(0, 0, 0, .5);
      --glow: 0 0 40px rgba(16, 185, 129, .15);
      --glow-s: 0 0 20px rgba(16, 185, 129, .2);
      /* Fonts */
      --serif: 'Fraunces', serif;
      --sans: 'Outfit', sans-serif;
    }

    /* ═══════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════ */
    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: var(--navy)
    }

    ::-webkit-scrollbar-thumb {
      background: var(--em-d);
      border-radius: 3px
    }

    /* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
    .page {
      min-height: 100vh;
      padding-top: 64px
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem
    }

    .section {
      padding: 4rem 0
    }

    /* ═══════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════ */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2000;
      height: 64px;
      display: flex;
      align-items: center;
      background: rgba(6, 14, 26, .92);
      backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border2);
      box-shadow: 0 2px 20px rgba(0, 0, 0, .4);
    }

    .navbar-inner {
      width: 100%;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: .6rem;
      cursor: pointer
    }

    .brand-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--emerald), var(--em-xl));
      display: grid;
      place-items: center;
      font-size: 1rem;
      box-shadow: var(--glow-s);
    }

    .brand-name {
      font-family: var(--serif);
      font-size: 1.2rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: .01em
    }

    .brand-name span {
      color: var(--emerald)
    }

    .nav-menu {
      display: flex;
      gap: .15rem;
      align-items: center
    }

    .nav-btn {
      padding: .42rem .95rem;
      border-radius: 8px;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .02em;
      color: var(--muted);
      background: transparent;
      border: none;
      transition: .2s;
      display: flex;
      align-items: center;
      gap: .4rem;
    }

    .nav-btn:hover {
      background: rgba(16, 185, 129, .1);
      color: var(--emerald)
    }

    .nav-btn.active {
      background: rgba(16, 185, 129, .14);
      color: var(--emerald)
    }

    .nav-divider {
      width: 1px;
      height: 20px;
      background: var(--border2);
      margin: 0 .4rem
    }

    /* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
    .hero {
      min-height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('https://images.unsplash.com/photo-1587351021759-3e566b6af7cc?w=1900&q=80');
      background-size: cover;
      background-position: center 30%;
      animation: parallax 18s ease-in-out infinite alternate;
    }

    @keyframes parallax {
      from {
        transform: scale(1.08)
      }

      to {
        transform: scale(1)
      }
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(6, 14, 26, .75) 0%, rgba(6, 14, 26, .45) 40%, rgba(6, 14, 26, .9) 100%),
        radial-gradient(ellipse 70% 60% at 20% 50%, rgba(16, 185, 129, .18), transparent),
        radial-gradient(ellipse 50% 70% at 85% 20%, rgba(59, 130, 246, .1), transparent);
    }

    /* Animated grid lines */
    .hero-grid {
      position: absolute;
      inset: 0;
      opacity: .06;
      background-image: linear-gradient(rgba(16, 185, 129, .5) 1px, transparent 1px),
        linear-gradient(90deg, rgba(16, 185, 129, .5) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 820px;
      width: 100%;
    }

    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: rgba(16, 185, 129, .1);
      border: 1px solid rgba(16, 185, 129, .3);
      padding: .4rem 1.1rem;
      border-radius: 50px;
      margin-bottom: 1.8rem;
      font-size: .75rem;
      font-weight: 700;
      color: var(--emerald);
      letter-spacing: .1em;
      text-transform: uppercase;
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #4ade80;
      animation: pls 2s infinite;
    }

    @keyframes pls {

      0%,
      100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(74, 222, 128, .4)
      }

      50% {
        opacity: .7;
        box-shadow: 0 0 0 6px rgba(74, 222, 128, 0)
      }
    }

    .hero h1 {
      font-family: var(--serif);
      font-size: clamp(2.6rem, 6vw, 5rem);
      font-weight: 800;
      color: #fff;
      line-height: 1.08;
      margin-bottom: 1rem;
      text-shadow: 0 4px 30px rgba(0, 0, 0, .5);
    }

    .hero h1 em {
      color: var(--emerald);
      font-style: italic;
      font-weight: 300
    }

    .hero-sub {
      font-size: 1.05rem;
      color: var(--light);
      line-height: 1.75;
      margin-bottom: 2.5rem;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ═══════════════════════════════════════════
   SEARCH WIDGET
═══════════════════════════════════════════ */
    .search-widget {
      background: rgba(14, 28, 46, .95);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(16, 185, 129, .2);
      border-radius: 22px;
      padding: 1.6rem 1.8rem;
      box-shadow: 0 30px 80px rgba(0, 0, 0, .6), 0 0 0 1px rgba(16, 185, 129, .06);
      max-width: 780px;
      margin: 0 auto;
    }

    .sw-row {
      display: flex;
      gap: .8rem;
      align-items: flex-end;
      flex-wrap: wrap
    }

    .sw-field {
      flex: 1 1 200px;
      display: flex;
      flex-direction: column;
      gap: .4rem
    }

    .sw-label {
      font-size: .7rem;
      font-weight: 700;
      color: var(--emerald);
      letter-spacing: .1em;
      text-transform: uppercase
    }

    .sw-input,
    .sw-select {
      background: rgba(255, 255, 255, .05);
      border: 1.5px solid rgba(16, 185, 129, .18);
      border-radius: 12px;
      padding: .7rem 1rem;
      font-size: .9rem;
      color: #fff;
      outline: none;
      transition: .25s;
      appearance: none;
      -webkit-appearance: none;
    }

    .sw-input::placeholder {
      color: var(--muted)
    }

    .sw-select option {
      background: #0e1c2e;
      color: #fff
    }

    .sw-input:focus,
    .sw-select:focus {
      border-color: var(--emerald);
      background: rgba(16, 185, 129, .06);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, .1);
    }

    .sw-btn {
      background: linear-gradient(135deg, var(--emerald), var(--em-xl));
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: .72rem 2rem;
      font-size: .92rem;
      font-weight: 700;
      letter-spacing: .03em;
      white-space: nowrap;
      flex-shrink: 0;
      transition: .25s;
      box-shadow: 0 6px 24px rgba(16, 185, 129, .3);
    }

    .sw-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(16, 185, 129, .4)
    }

    .sw-btn:active {
      transform: translateY(0)
    }

    .sw-btn:disabled {
      opacity: .5;
      cursor: not-allowed
    }

    /* Suggestions dropdown */
    .suggestions {
      position: relative;
    }

    .sug-list {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 100;
      background: var(--card2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    .sug-item {
      padding: .7rem 1rem;
      font-size: .88rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border2);
      transition: .15s;
      display: flex;
      align-items: center;
      gap: .5rem;
      color: var(--light);
    }

    .sug-item:last-child {
      border-bottom: none
    }

    .sug-item:hover {
      background: rgba(16, 185, 129, .1);
      color: #fff
    }

    .sug-item .sug-icon {
      font-size: .9rem;
      opacity: .7
    }

    /* ═══════════════════════════════════════════
   STATS BAR
═══════════════════════════════════════════ */
    .stats-bar {
      background: var(--navy2);
      border-top: 1px solid var(--border2);
      border-bottom: 1px solid var(--border2);
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stat {
      padding: 1.4rem 2.5rem;
      text-align: center;
      border-right: 1px solid var(--border2);
      flex: 1;
      min-width: 130px;
    }

    .stat:last-child {
      border-right: none
    }

    .stat-n {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 800;
      color: var(--emerald)
    }

    .stat-l {
      font-size: .72rem;
      color: var(--muted);
      margin-top: .2rem;
      letter-spacing: .05em;
      text-transform: uppercase
    }

    /* ═══════════════════════════════════════════
   QUICK CITIES
═══════════════════════════════════════════ */
    .cities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: .75rem;
      margin-top: 1.5rem;
    }

    .city-btn {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 14px;
      padding: .85rem .75rem;
      text-align: center;
      cursor: pointer;
      transition: .25s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .35rem;
    }

    .city-btn:hover {
      border-color: var(--emerald);
      background: rgba(16, 185, 129, .08);
      transform: translateY(-2px);
      box-shadow: var(--glow-s);
    }

    .city-flag {
      font-size: 1.5rem
    }

    .city-name {
      font-size: .82rem;
      font-weight: 600;
      color: var(--light)
    }

    .city-state {
      font-size: .7rem;
      color: var(--muted)
    }

    /* ═══════════════════════════════════════════
   SECTION HEADER
═══════════════════════════════════════════ */
    .sec-tag {
      display: inline-block;
      background: rgba(16, 185, 129, .1);
      color: var(--emerald);
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: .3rem .9rem;
      border-radius: 50px;
      border: 1px solid rgba(16, 185, 129, .25);
      margin-bottom: .9rem;
    }

    .sec-head {
      text-align: center;
      margin-bottom: 2.5rem
    }

    .sec-head h2 {
      font-family: var(--serif);
      font-size: 2.2rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: .5rem;
    }

    .sec-head p {
      color: var(--muted);
      font-size: .92rem
    }

    /* ═══════════════════════════════════════════
   LOADING
═══════════════════════════════════════════ */
    .loading-wrap {
      text-align: center;
      padding: 5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
    }

    .spinner {
      width: 52px;
      height: 52px;
      border: 3px solid rgba(16, 185, 129, .12);
      border-top-color: var(--emerald);
      border-radius: 50%;
      animation: spin .85s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .loading-text {
      color: var(--muted);
      font-size: .92rem
    }

    .loading-sub {
      color: rgba(107, 135, 168, .6);
      font-size: .8rem
    }

    /* ═══════════════════════════════════════════
   RESULTS CONTROLS
═══════════════════════════════════════════ */
    .results-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 1rem;
      padding-bottom: 1.2rem;
      border-bottom: 1px solid var(--border2);
    }

    .results-title {
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff
    }

    .results-title span {
      color: var(--emerald)
    }

    .results-sub {
      font-size: .82rem;
      color: var(--muted);
      margin-top: .2rem
    }

    .chips {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap
    }

    .chip {
      padding: .35rem .85rem;
      border-radius: 50px;
      font-size: .78rem;
      font-weight: 600;
      border: 1.5px solid var(--border2);
      background: transparent;
      color: var(--muted);
      transition: .2s;
    }

    .chip:hover:not(.active) {
      border-color: rgba(16, 185, 129, .4);
      color: var(--emerald)
    }

    .chip.active {
      background: var(--emerald);
      color: #fff;
      border-color: var(--emerald)
    }

    .sort-select {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 10px;
      padding: .4rem .8rem;
      font-size: .8rem;
      color: var(--light);
      outline: none;
      appearance: none;
      cursor: pointer;
    }

    /* ═══════════════════════════════════════════
   MAP
═══════════════════════════════════════════ */
    #hosp-map {
      height: 420px;
      border-radius: 18px;
      overflow: hidden;
      margin-bottom: 2rem;
      box-shadow: var(--shadow), 0 0 0 1px var(--border2);
    }

    .leaflet-popup-content-wrapper {
      background: var(--card2) !important;
      border: 1px solid var(--border) !important;
      border-radius: 12px !important;
      box-shadow: var(--shadow) !important;
      color: var(--text) !important;
    }

    .leaflet-popup-tip {
      background: var(--card2) !important
    }

    .leaflet-popup-close-button {
      color: var(--muted) !important
    }

    /* ═══════════════════════════════════════════
   HOSPITAL CARDS
═══════════════════════════════════════════ */
    .hosp-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.2rem;
    }

    .hosp-card {
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 18px;
      overflow: hidden;
      transition: .3s cubic-bezier(.2, .8, .2, 1);
      position: relative;
    }

    .hosp-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      opacity: 0;
      transition: .3s;
    }

    .hosp-card:hover {
      transform: translateY(-5px);
      border-color: rgba(16, 185, 129, .25);
      box-shadow: 0 20px 60px rgba(0, 0, 0, .5), var(--glow);
    }

    .hosp-card:hover::before {
      opacity: 1
    }

    .card-accent {
      height: 4px
    }

    .card-head {
      padding: 1.2rem 1.3rem 1rem;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: .5rem
    }

    .card-name {
      font-family: var(--serif);
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      line-height: 1.3;
      flex: 1
    }

    .card-type-badge {
      font-size: .68rem;
      font-weight: 700;
      padding: .22rem .55rem;
      border-radius: 6px;
      white-space: nowrap;
      letter-spacing: .04em;
      flex-shrink: 0;
    }

    .card-body {
      padding: 0 1.3rem .9rem
    }

    .card-row {
      display: flex;
      align-items: flex-start;
      gap: .55rem;
      margin-bottom: .55rem;
      font-size: .82rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-row .ri {
      flex-shrink: 0;
      margin-top: .1rem;
      font-size: .9rem
    }

    .card-row a {
      color: var(--emerald);
      font-weight: 500
    }

    .card-row a:hover {
      text-decoration: underline
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: .3rem;
      margin: .6rem 0
    }

    .ctag {
      font-size: .69rem;
      font-weight: 700;
      padding: .18rem .48rem;
      border-radius: 5px;
      letter-spacing: .03em;
    }

    .card-foot {
      padding: .85rem 1.3rem;
      border-top: 1px solid var(--border2);
      display: flex;
      gap: .5rem;
    }

    .cbtn {
      flex: 1;
      padding: .5rem;
      border-radius: 9px;
      font-size: .78rem;
      font-weight: 700;
      transition: .2s;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .3rem;
      border: 1.5px solid transparent;
      letter-spacing: .02em;
    }

    .cbtn-p {
      background: var(--emerald);
      color: #fff;
      border-color: var(--emerald)
    }

    .cbtn-p:hover {
      background: var(--em-d)
    }

    .cbtn-o {
      background: transparent;
      color: var(--emerald);
      border-color: rgba(16, 185, 129, .25)
    }

    .cbtn-o:hover {
      background: rgba(16, 185, 129, .1);
      border-color: rgba(16, 185, 129, .4)
    }

    .cbtn-compare {
      background: transparent;
      color: var(--sapphire);
      border-color: rgba(59, 130, 246, .25)
    }

    .cbtn-compare:hover {
      background: rgba(59, 130, 246, .1)
    }

    .cbtn-compare.selected {
      background: rgba(59, 130, 246, .2);
      border-color: var(--sapphire)
    }

    /* ═══════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════ */
    .empty-state {
      text-align: center;
      padding: 5rem 2rem;
      grid-column: 1/-1;
    }

    .empty-ico {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: .6
    }

    .empty-state h3 {
      font-family: var(--serif);
      font-size: 1.5rem;
      color: #fff;
      margin-bottom: .5rem
    }

    .empty-state p {
      color: var(--muted);
      font-size: .9rem;
      max-width: 350px;
      margin: 0 auto
    }

    /* ═══════════════════════════════════════════
   COMPARE PAGE
═══════════════════════════════════════════ */
    .compare-notice {
      background: rgba(59, 130, 246, .08);
      border: 1px solid rgba(59, 130, 246, .2);
      border-radius: 14px;
      padding: 1.2rem 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: .8rem;
      font-size: .88rem;
      color: var(--light);
    }

    .compare-table-wrap {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid var(--border2)
    }

    .compare-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px
    }

    .compare-table th {
      background: var(--card2);
      padding: 1rem 1.2rem;
      text-align: left;
      font-size: .78rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border2);
    }

    .compare-table td {
      padding: .9rem 1.2rem;
      border-bottom: 1px solid var(--border2);
      font-size: .85rem;
      color: var(--light);
      vertical-align: top;
    }

    .compare-table tr:last-child td {
      border-bottom: none
    }

    .compare-table tr:hover td {
      background: rgba(16, 185, 129, .03)
    }

    .compare-table .hosp-col {
      color: #fff;
      font-weight: 600
    }

    .compare-badge-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: .25rem
    }

   RECOMMEND PAGE
═══════════════════════════════════════════ */
    .rec-form {
      max-width: 680px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 2rem;
    }

    .rec-field {
      margin-bottom: 1.5rem
    }

    .rec-field label {
      display: block;
      font-size: .8rem;
      font-weight: 700;
      color: var(--emerald);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: .5rem;
    }

    .rec-field input,
    .rec-field select,
    .rec-field textarea {
      width: 100%;
      background: rgba(255, 255, 255, .04);
      border: 1.5px solid var(--border2);
      border-radius: 11px;
      padding: .7rem 1rem;
      font-size: .9rem;
      color: #fff;
      outline: none;
      transition: .2s;

    .rec-field textarea {
      resize: vertical;
      min-height: 90px
    }

    .rec-field input:focus,
    .rec-field select:focus,
    .rec-field textarea:focus {
      border-color: var(--emerald);
      background: rgba(16, 185, 129, .05);
    }

    .rec-field select option {
      background: var(--card);
      color: #fff
    }

    .option-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: .5rem
    }

    .option-btn {
      padding: .55rem .7rem;
      border-radius: 9px;
      font-size: .8rem;
      font-weight: 600;
      border: 1.5px solid var(--border2);
      color: var(--muted);
      background: transparent;
      transition: .2s;

    .option-btn.selected {

    /* ════════════════════════════════════════════
       HOOKS
    ════════════════════════════════════════════ */
    function useToast() {
      const [state, setState] = useState({ msg: '', visible: false });
      const show = useCallback((msg) => {
        setState({ msg, visible: true });
        setTimeout(() => setState(s => ({ ...s, visible: false })), 3200);
      }, []);
      return { ...state, show };
    }

    function useOSMSearch() {
      const [loading, setLoading] = useState(false);
      const [data, setData] = useState([]);
      const [center, setCenter] = useState(null);
      const [cityName, setCityName] = useState('');
      const [error, setError] = useState('');

      const search = async (city, amenityFilter = '') => {
        setLoading(true); setError(''); setData([]);
        try {
          // Geocode
          const geoR = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(city + ', India')}&format=json&limit=1`,
            { headers: { 'Accept-Language': 'en' } }
          );
          const geoD = await geoR.json();
          if (!geoD.length) { setError('City not found'); setLoading(false); return; }
          const { lat, lon, display_name } = geoD[0];
          setCenter([parseFloat(lat), parseFloat(lon)]);
          setCityName(display_name.split(',')[0]);

          // Build amenity filter
          const amenities = amenityFilter && amenityFilter !== 'all'
            ? amenityFilter
            : 'hospital|clinic|doctors|pharmacy|dentist|optician|nursing_home';

          const q = `[out:json][timeout:35];(
        node["amenity"~"${amenities}"](around:10000,${lat},${lon});
        way["amenity"~"${amenities}"](around:10000,${lat},${lon});
        relation["amenity"~"${amenities}"](around:10000,${lat},${lon});
      );out center tags;`;

          const ovR = await fetch('https://overpass-api.de/api/interpreter', {
            method: 'POST', body: `data=${encodeURIComponent(q)}`
          });
          const ovD = await ovR.json();
          const parsed = (ovD.elements || [])
            .filter(e => e.tags?.name)
            .map(parseEl);
          setData(parsed);
        } catch (e) {
          setError('Network error. Please try again.');
        }
        setLoading(false);
      };

      const searchByCoords = async (lat, lon, name, amenityFilter = '') => {
        setLoading(true); setError(''); setData([]);
        setCenter([lat, lon]); setCityName(name);
        try {
          const amenities = amenityFilter && amenityFilter !== 'all'
            ? amenityFilter
            : 'hospital|clinic|doctors|pharmacy|dentist|optician|nursing_home';
          const q = `[out:json][timeout:35];(
        node["amenity"~"${amenities}"](around:10000,${lat},${lon});
        way["amenity"~"${amenities}"](around:10000,${lat},${lon});
        relation["amenity"~"${amenities}"](around:10000,${lat},${lon});
      );out center tags;`;
          const ovR = await fetch('https://overpass-api.de/api/interpreter', {
            method: 'POST', body: `data=${encodeURIComponent(q)}`
          });
          const ovD = await ovR.json();
          const parsed = (ovD.elements || []).filter(e => e.tags?.name).map(parseEl);
          setData(parsed);
        } catch (e) {
          setError('Network error. Please try again.');
        }
        setLoading(false);
      };

      return { loading, data, center, cityName, error, search, searchByCoords };
    }

    function parseEl(el) {
      const t = el.tags || {};
      const lat = el.lat ?? el.center?.lat;
      const lon = el.lon ?? el.center?.lon;
      const addr = [t['addr:housenumber'], t['addr:street'], t['addr:city']]
        .filter(Boolean).join(', ') || t['addr:full'] || '';
      const services = [];
      if (t.emergency === 'yes') services.push({ l: 'Emergency', c: '#f43f5e' });
      if (t.wheelchair === 'yes') services.push({ l: 'Accessible ♿', c: '#3b82f6' });
      if (t.beds) services.push({ l: `${t.beds} Beds`, c: '#8b5cf6' });
      if (t.blood_bank === 'yes') services.push({ l: 'Blood Bank', c: '#f43f5e' });
      if (t.laboratory === 'yes') services.push({ l: 'Lab', c: '#10b981' });
      if (t.health_specialty) services.push({ l: t.health_specialty, c: '#f59e0b' });
      if (t['health:speciality']) services.push({ l: t['health:speciality'], c: '#f59e0b' });
      if (t.insurance === 'yes') services.push({ l: 'Insurance', c: '#6b87a8' });
      if (t.dialysis === 'yes') services.push({ l: 'Dialysis', c: '#38bdf8' });
      return {
        id: el.id, type: el.type || 'node',
        name: t.name,
        amenity: t.amenity || 'hospital',
        addr, phone: t.phone || t['contact:phone'] || null,
        website: t.website || t['contact:website'] || null,
        opening: t.opening_hours || null,
        operator: t.operator || null,
        emergency: t.emergency === 'yes',
        beds: t.beds || null,
        lat: lat ? parseFloat(lat) : null,
        lon: lon ? parseFloat(lon) : null,
        services,
        raw: t,
      };
    }

    /* ════════════════════════════════════════════
       MAP COMPONENT
    ════════════════════════════════════════════ */
    function LeafletMap({ hospitals, center, height = '420px' }) {
      const mapRef = useRef(null);
      const instRef = useRef(null);
      const marksRef = useRef([]);

      useEffect(() => {
        if (!mapRef.current) return;
        if (!instRef.current) {
          instRef.current = L.map(mapRef.current, { zoomControl: true }).setView(center, 13);
          // Dark tiles
          L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '©OSM ©CARTO', maxZoom: 19
          }).addTo(instRef.current);
        } else {
          instRef.current.setView(center, 13);
        }
        // Clear old markers
        marksRef.current.forEach(m => m.remove());
        marksRef.current = [];
        // Center marker
        const ci = L.divIcon({
          html: `<div style="width:14px;height:14px;border-radius:50%;background:#f59e0b;border:3px solid #fff;box-shadow:0 0 0 5px rgba(245,158,11,.25)"></div>`,
          iconSize: [14, 14], iconAnchor: [7, 7], className: ''
        });
        const cm = L.marker(center, { icon: ci }).addTo(instRef.current)
          .bindPopup('<strong style="color:#f59e0b">📍 Search Center</strong>');
        marksRef.current.push(cm);
        // Hospital markers
        hospitals.forEach(h => {
          if (!h.lat || !h.lon) return;
          const m = getMeta(h.amenity);
          const icon = L.divIcon({
            html: `<div style="width:26px;height:26px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);
          background:${m.color};border:2.5px solid rgba(255,255,255,.85);
          box-shadow:0 3px 12px rgba(0,0,0,.5)"></div>`,
            iconSize: [26, 26], iconAnchor: [13, 26], popupAnchor: [0, -28], className: ''
          });
          const mk = L.marker([h.lat, h.lon], { icon }).addTo(instRef.current).bindPopup(`
        <div style="font-family:Outfit,sans-serif;min-width:195px;padding:2px 0">
          <div style="font-weight:700;font-size:.9rem;color:${m.color};margin-bottom:3px">${h.name}</div>
          <div style="font-size:.73rem;color:#94a3b8;margin-bottom:6px">${m.icon} ${m.label}</div>
          ${h.addr ? `<div style="font-size:.73rem;color:#94a3b8;margin-bottom:4px">📍 ${h.addr}</div>` : ''}
          ${h.phone ? `<div style="font-size:.73rem;color:#94a3b8;margin-bottom:6px">📞 ${h.phone}</div>` : ''}
          <a href="https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lon}" target="_blank"
            style="display:inline-block;background:${m.color};color:#fff;padding:5px 12px;
            border-radius:7px;font-size:.73rem;text-decoration:none;font-weight:700;margin-top:2px">
            Get Directions →</a>
        </div>
      `);
          marksRef.current.push(mk);
        });
        // Fit bounds
        if (hospitals.filter(h => h.lat && h.lon).length > 0) {
          const coords = hospitals.filter(h => h.lat && h.lon).map(h => [h.lat, h.lon]);
          coords.push(center);
          instRef.current.fitBounds(coords, { padding: [40, 40], maxZoom: 15 });
        }
      }, [hospitals, center]);

      return <div id="hosp-map" ref={mapRef} style={{ height }} />;
    }

    /* ════════════════════════════════════════════
       CITY SEARCH WITH AUTOCOMPLETE
    ════════════════════════════════════════════ */
    function SearchWidget({ onSearch, loading }) {
      const [city, setCity] = useState('');
      const [type, setType] = useState('all');
      const [suggestions, setSuggestions] = useState([]);
      const [focused, setFocused] = useState(false);

      const filtered = useMemo(() => {
        if (city.length < 2) return [];
        return INDIAN_CITIES.filter(c => c.name.toLowerCase().startsWith(city.toLowerCase())).slice(0, 8);
      }, [city]);

      const handleSearch = () => {
        if (!city.trim()) return;
        setSuggestions([]);
        onSearch(city, type);
      };

      const pickCity = (c) => {
        setCity(c.name); setSuggestions([]); setFocused(false);
        onSearch(c.name, type, c.lat, c.lon);
      };

      return (
        <div className="search-widget">
          <div className="sw-row">
            <div className="sf" style={{ flex: '1 1 240px', position: 'relative' }}>
              <label className="sw-label">City / Area</label>
              <div className="suggestions">
                <input
                  className="sw-input"
                  type="text" value={city}
                  onChange={e => { setCity(e.target.value) }}
                  onKeyDown={e => e.key === 'Enter' && handleSearch()}
                  onFocus={() => setFocused(true)}
                  onBlur={() => setTimeout(() => setFocused(false), 200)}
                  placeholder="Mysuru, Bengaluru, Mumbai, Chennai…"
                />
                {focused && filtered.length > 0 && (
                  <div className="sug-list">
                    {filtered.map((c, i) => (
                      <div key={i} className="sug-item" onMouseDown={() => pickCity(c)}>
                        <span className="sug-icon">{c.emoji}</span>
                        <span>{c.name}</span>
                        <span style={{ marginLeft: 'auto', fontSize: '.72rem', color: 'var(--muted)' }}>{c.state}</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            </div>
            <div className="sf" style={{ flex: '0 1 170px' }}>
              <label className="sw-label">Facility Type</label>
              <select className="sw-select" value={type} onChange={e => setType(e.target.value)}>
                <option value="all">All Facilities</option>
                <option value="hospital">Hospitals</option>
                <option value="clinic">Clinics</option>
                <option value="pharmacy">Pharmacies</option>
                <option value="dentist">Dental</option>
                <option value="optician">Eye Care</option>
                <option value="doctors">Doctor Offices</option>
                <option value="nursing_home">Nursing Homes</option>
              </select>
            </div>
            <button className="sw-btn" onClick={handleSearch} disabled={loading}>
              {loading ? '⏳ Searching…' : '🔍 Find Hospitals'}
            </button>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       HOSPITALS PAGE
    ════════════════════════════════════════════ */
    function HospitalsPage({ osmHook, onSearch, compareList, onCompare, loading }) {
      const { data, center, cityName, error } = osmHook;
      const [activeFilter, setActiveFilter] = useState('all');
      const [sort, setSort] = useState('default');

      const displayed = useMemo(() => {
        let d = [...data];
        if (activeFilter !== 'all') {
          if (activeFilter === 'clinic') d = d.filter(h => ['clinic', 'doctors'].includes(h.amenity));
          else d = d.filter(h => h.amenity === activeFilter);
        }
        if (sort === 'name') d.sort((a, b) => a.name.localeCompare(b.name));
        if (sort === 'emergency') d.sort((a, b) => b.emergency - a.emergency);
        if (sort === 'beds') d.sort((a, b) => (parseInt(b.beds) || 0) - (parseInt(a.beds) || 0));
        return d;
      }, [data, activeFilter, sort]);

      const counts = useMemo(() => {
        const c = {};
        data.forEach(h => {
          const k = h.amenity;
          c[k] = (c[k] || 0) + 1;
        });
        return c;
      }, [data]);

      return (
        <div className="page">
          <div className="container">
            <div className="section">
              {/* Top search */}
              <div style={{ marginBottom: '2rem' }}>
                <SearchWidget onSearch={onSearch} loading={loading} />
              </div>

              {loading && (
                <div className="loading-wrap">
                  <div className="spinner" />
                  <div className="loading-text">Fetching hospitals from OpenStreetMap…</div>
                  <div className="loading-sub">Querying 10km radius · This may take a few seconds</div>
                </div>
              )}

              {error && (
                <div style={{
                  background: 'rgba(244,63,94,.08)', border: '1px solid rgba(244,63,94,.2)',
                  borderRadius: 14, padding: '1.2rem 1.5rem', color: '#f43f5e', textAlign: 'center', marginTop: '1rem'
                }}>
                  ⚠️ {error}
                </div>
              )}

              {data.length > 0 && center && !loading && (
                <>
                  {/* Results header */}
                  <div className="results-bar">
                    <div>
                      <div className="results-title">
                        Found <span>{displayed.length}</span> facilities near "{cityName}"
                      </div>
                      <div className="results-sub">Showing {displayed.length} of {data.length} total · 10km radius</div>
                    </div>
                    <div style={{ display: 'flex', gap: '.75rem', alignItems: 'center', flexWrap: 'wrap' }}>
                      <select className="sort-select" value={sort} onChange={e => setSort(e.target.value)}>
                        <option value="default">Default order</option>
                        <option value="name">Sort: Name A–Z</option>
                        <option value="emergency">Sort: Emergency first</option>
                        <option value="beds">Sort: Most beds</option>
                      </select>
                    </div>
                  </div>

                  {/* Filter chips */}
                  <div className="chips" style={{ marginBottom: '1.5rem' }}>
                    <button className={`chip ${activeFilter === 'all' ? 'active' : ''}`}
                      onClick={() => setActiveFilter('all')}>
                      All ({data.length})
                    </button>
                    {Object.entries(AMENITY_META).map(([k, v]) => {
                      const cnt = counts[k] || 0;
                      if (!cnt) return null;
                      return <button key={k}
                        className={`chip ${activeFilter === k ? 'active' : ''}`}
                        onClick={() => setActiveFilter(k)}>
                        {v.icon} {v.label} ({cnt})
                      </button>;
                    })}
                  </div>

                  {/* Map */}
                  <LeafletMap hospitals={displayed} center={center} />

                  {/* Cards */}
                  <div className="hosp-grid">
                    {displayed.length === 0
                      ? <div className="empty-state">
                        <div className="empty-ico">🔍</div>
                        <h3>No results for this filter</h3>
                        <p>Try a different filter type or search another area</p>
                      </div>
                      : displayed.map((h, i) => (
                        <HospitalCard
                          key={h.id} h={h} idx={i}
                          onCompare={onCompare}
                          compareList={compareList}
                        />
                      ))
                    }
                  </div>

                  {compareList.length > 0 && (
                    <div style={{
                      position: 'fixed', bottom: '1.5rem', left: '50%', transform: 'translateX(-50%)',
                      background: 'linear-gradient(135deg,#3b82f6,#2563eb)',
                      color: '#fff', padding: '.75rem 1.8rem', borderRadius: 50, zIndex: 1500,
                      fontWeight: 700, fontSize: '.88rem',
                      boxShadow: '0 8px 30px rgba(59,130,246,.4)',
                      display: 'flex', alignItems: 'center', gap: '.6rem', cursor: 'default'
                    }}>
                      ⊕ {compareList.length} hospitals selected for comparison
                    </div>
                  )}
                </>
              )}

              {data.length === 0 && !loading && !error && (
                <div className="empty-state" style={{ gridColumn: 'unset' }}>
                  <div className="empty-ico">🏥</div>
                  <h3>Search for a city above</h3>
                  <p>Enter any Indian city name to discover hospitals, clinics, pharmacies and more using live OpenStreetMap data.</p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

          )
        },
        { key: 'website', label: 'Website', render: h => h.website ? <a href={h.website} target="_blank" style={{ color: 'var(--emerald)' }}>Visit →</a> : '—' },
        { key: 'directions', label: 'Directions', render: h => h.lat && h.lon ? <a href={`https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lon}`} target="_blank" style={{ color: 'var(--sapphire)' }}>Get Directions →</a> : '—' },
      ];

      return (
        <div className="page">
          <div className="container">
            <div className="section">
              <div className="sec-head" style={{ textAlign: 'left' }}>
                <div className="sec-tag">Compare</div>
                <h2>Side-by-Side Comparison</h2>
                <p>Compare hospitals by services, contact info and facilities</p>
              </div>

              {compareList.length === 0 ? (
                <div className="empty-state" style={{ gridColumn: 'unset' }}>
                  <div className="empty-ico">⚖️</div>
                  <h3>No hospitals selected</h3>
                  <p>Go to Hospitals tab, search a city, then click "⊕ Compare" on up to 3 hospitals.</p>
                </div>
              ) : (
                <>
                  <div className="compare-notice">
                    ℹ️ Comparing <strong style={{ color: '#fff', margin: '0 .25rem' }}>{compareList.length}</strong> hospitals.
                    <span style={{ marginLeft: 'auto', display: 'flex', gap: '.5rem' }}>
                      {compareList.map((h, i) => (
                        <button key={i} onClick={() => onRemove(h)}
                          style={{
                            background: 'rgba(244,63,94,.1)', color: '#f43f5e',
                            border: '1px solid rgba(244,63,94,.2)', borderRadius: 7,
                            padding: '.25rem .6rem', fontSize: '.75rem', cursor: 'pointer', fontWeight: 600
                          }}>
                          ✕ {h.name.slice(0, 20)}
                        </button>
                      ))}
                      <button onClick={onClear}
                        style={{
                          background: 'rgba(255,255,255,.06)', color: 'var(--muted)',
                          border: '1px solid var(--border2)', borderRadius: 7,
                          padding: '.25rem .75rem', fontSize: '.75rem', cursor: 'pointer'
                        }}>
                        Clear all
                      </button>
                    </span>
                  </div>

                  <div className="compare-table-wrap">
                    <table className="compare-table">
                      <thead>
                        <tr>
                          <th style={{ width: '120px' }}>Field</th>
                          {compareList.map((h, i) => (
                            <th key={i} style={{ color: getMeta(h.amenity).color }}>
                              {getMeta(h.amenity).icon} {h.name}
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {FIELDS.map((f, fi) => (
                          <tr key={fi}>
                            <td style={{ color: 'var(--muted)', fontWeight: 600, fontSize: '.78rem', textTransform: 'uppercase', letterSpacing: '.04em' }}>
                              {f.label}
                            </td>
                            {compareList.map((h, hi) => (
                              <td key={hi} className={f.key === 'name' ? 'hosp-col' : ''}>
                                {f.render ? f.render(h) : (h[f.key] || <span style={{ color: 'var(--muted)' }}>—</span>)}
                              </td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       RECOMMEND PAGE
    ════════════════════════════════════════════ */
    function RecommendPage({ osmHook, onSearch, loading }) {
      const { data, cityName } = osmHook;
      const [form, setForm] = useState({ city: '', need: '', type: '', emergency: false, wheelchair: false, pharmacy: false });
      const [results, setResults] = useState([]);
      const [ran, setRan] = useState(false);

      const NEEDS = ['General Checkup', 'Surgery', 'Maternity', 'Pediatrics', 'Orthopedics', 'Cardiology', 'Dermatology', 'Neurology', 'ENT', 'Oncology'];
      const setF = (k, v) => setForm(p => ({ ...p, [k]: v }));

      const recommend = async () => {
        if (!form.city.trim()) { return; }
        if (data.length === 0 || cityName !== form.city) {
          await onSearch(form.city, 'all');
        }
        setRan(true);
      };

      useEffect(() => {
        if (!ran || data.length === 0) return;
        // Score hospitals
        let scored = data.map(h => {
          let score = 50;
          // Emergency bonus
          if (form.emergency && h.emergency) score += 30;
          if (form.emergency && !h.emergency) score -= 20;
          // Type match
          if (form.type && h.amenity === form.type) score += 20;
          // Wheelchair
          if (form.wheelchair && h.raw.wheelchair === 'yes') score += 10;
          // Has address = more established
          if (h.addr) score += 10;
          // Has phone
          if (h.phone) score += 8;
          // Has website
          if (h.website) score += 6;
          // Has opening hours
          if (h.opening) score += 5;
          // Hospital > clinic
          if (h.amenity === 'hospital') score += 12;
          // Beds
          if (h.beds) score += Math.min(parseInt(h.beds) || 0, 5);
          // Operator
          if (h.operator) score += 4;
          // Services
          score += h.services.length * 3;
          return { ...h, score: Math.min(score, 100) };
        });
        scored.sort((a, b) => b.score - a.score);
        setResults(scored.slice(0, 8));
        setRan(false);
      }, [data, ran]);

      return (
        <div className="page">
          <div className="container">
            <div className="section">
              <div className="sec-head" style={{ textAlign: 'left' }}>
                <div className="sec-tag">Smart Recommend</div>
                <h2>Find Your Best Match</h2>
                <p>Tell us your needs and we'll rank available hospitals for you</p>
              </div>

              <div className="rec-form">
                <div className="rec-field">
                  <label>City / Area *</label>
                  <input type="text" value={form.city} placeholder="e.g. Mysuru"
                    onChange={e => setF('city', e.target.value)} />
                </div>
                <div className="rec-field">
                  <label>Medical Need</label>
                  <div className="option-grid">
                    {NEEDS.map((n, i) => (
                      <button key={i} className={`option-btn ${form.need === n ? 'selected' : ''}`}
                        onClick={() => setF('need', form.need === n ? '' : n)}>
                        {n}
                      </button>
                    ))}
                  </div>
                </div>
                <div className="rec-field">
                  <label>Preferred Facility Type</label>
                  <select value={form.type} onChange={e => setF('type', e.target.value)}>
                    <option value="">Any</option>
                    <option value="hospital">Hospital</option>
                    <option value="clinic">Clinic</option>
                    <option value="doctors">Doctor's Office</option>
                  </select>
                </div>
                <div className="rec-field">
                  <label>Special Requirements</label>
                  <div style={{ display: 'flex', gap: '1rem', flexWrap: 'wrap' }}>
                    {[['emergency', '🚨 Emergency Required'], ['wheelchair', '♿ Wheelchair Access'], ['pharmacy', '💊 Pharmacy Nearby']].map(([k, l]) => (
                      <button key={k} className={`option-btn ${form[k] ? 'selected' : ''}`}
                        style={{ flex: '1 1 160px' }}
                        onClick={() => setF(k, !form[k])}>
                        {l}
                      </button>
                    ))}
                  </div>
                </div>
                <button className="sw-btn" style={{ width: '100%', borderRadius: 12, padding: '.8rem' }}
                  onClick={recommend} disabled={loading || !form.city.trim()}>
                  {loading ? '⏳ Loading data…' : '🎯 Get Recommendations'}
                </button>
              </div>

              {results.length > 0 && (
                <div className="rec-results">
                  <div style={{ marginBottom: '1.2rem' }}>
                    <div className="sec-tag">Results</div>
                    <h3 style={{ fontFamily: 'var(--serif)', fontSize: '1.4rem', color: '#fff', marginTop: '.5rem' }}>
                      Top {results.length} Recommendations
                    </h3>
                  </div>
                  {results.map((h, i) => {
                    const m = getMeta(h.amenity);
                    const rankClass = i === 0 ? 'r1' : i === 1 ? 'r2' : 'r3';
                    return (
                      <div key={h.id} className="rec-card">
                        <div className={`rec-rank ${rankClass}`}>{i + 1}</div>
                        <div className="rec-info">
                          <div className="rec-name">{h.name}</div>
                          <div className="rec-meta">
                            <span style={{ color: m.color }}>{m.icon} {m.label}</span>
                            {h.addr && <span>📍 {h.addr.slice(0, 50)}</span>}
                            {h.phone && <span>📞 {h.phone}</span>}
                            {h.emergency && <span style={{ color: '#f43f5e' }}>🚨 Emergency</span>}
                          </div>
                          {h.services.length > 0 && (
                            <div style={{ display: 'flex', flexWrap: 'wrap', gap: '.3rem', marginTop: '.4rem' }}>
                              {h.services.slice(0, 4).map((s, si) => (
                                <span key={si} style={{
                                  background: `${s.c}18`, color: s.c,
                                  padding: '2px 7px', borderRadius: 5, fontSize: '.7rem', fontWeight: 700,
                                  border: `1px solid ${s.c}30`
                                }}>{s.l}</span>
                              ))}
                            </div>
                          )}
                        </div>
                        <div className="rec-score">
                          <div className="score-num">{h.score}</div>
                          <div className="score-lbl">Score</div>
                          {h.lat && h.lon && (
                            <a href={`https://www.google.com/maps/dir/?api=1&destination=${h.lat},${h.lon}`}
                              target="_blank" style={{
                                display: 'block', marginTop: '.4rem',
                                background: 'var(--emerald)', color: '#fff', padding: '4px 10px',
                                borderRadius: 7, fontSize: '.72rem', textAlign: 'center', fontWeight: 700
                              }}>
                              Directions →
                            </a>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       NEAREST PAGE
    ════════════════════════════════════════════ */
    function NearestPage({ onSearch, loading }) {
      const [locating, setLocating] = useState(false);
      const [locError, setLocError] = useState('');
      const [located, setLocated] = useState(false);

      const locate = () => {
        if (!navigator.geolocation) {
          setLocError('Geolocation not supported');
          return;
        }

        setLocating(true);
        setLocError('');

        navigator.geolocation.getCurrentPosition(
          pos => {
            const { latitude: lat, longitude: lon } = pos.coords;

            setLocating(false);
            setLocated(true);

            // ✅ GPS search
            onSearch(`${lat},${lon}`, 'all', lat, lon, true);
          },
          err => {
            setLocating(false);

            console.log("❌ Location denied:", err.message);

            // ✅ Fallback to city search
            const defaultCity = "Bailhongal"; // you can change

            setLocError('Location denied. Showing results for ' + defaultCity);

            onSearch(defaultCity, 'all', null, null, false);
          }
        );
      };

      return (
        <div className="page">
          <div className="container">
            <div className="section" style={{ textAlign: 'center', maxWidth: 560, margin: '0 auto' }}>
              <div className="sec-tag">Nearest</div>
              <h2 style={{ fontFamily: 'var(--serif)', fontSize: '2rem', color: '#fff', marginTop: '.5rem' }}>Find Hospitals Near You</h2>
              <p style={{ color: 'var(--muted)', margin: '1rem 0 2rem', lineHeight: 1.7 }}>
                Allow location access to instantly discover hospitals, clinics, and pharmacies within 10km of your current location.
              </p>
              <div style={{
                background: 'var(--card)', border: '1px solid var(--border2)',
                borderRadius: 24, padding: '3rem 2rem',
              }}>
                <div style={{ fontSize: '4rem', marginBottom: '1.5rem' }}>📍</div>
                <button className="sw-btn" style={{ borderRadius: 14, padding: '.85rem 2.5rem', fontSize: '1rem' }}
                  onClick={locate} disabled={locating || loading}>
                  {locating ? '📡 Locating…' : loading ? '⏳ Fetching…' : '🔍 Use My Location'}
                </button>
                {locError && (
                  <div style={{ marginTop: '1rem', color: '#f43f5e', fontSize: '.85rem' }}>{locError}</div>
                )}
                {located && !loading && (
                  <div style={{ marginTop: '1rem', color: 'var(--emerald)', fontSize: '.85rem' }}>
                    ✅ Location found! Check the Hospitals tab for results.
                  </div>
                )}
                <p style={{ marginTop: '1.5rem', fontSize: '.78rem', color: 'var(--muted)', lineHeight: 1.6 }}>
                  Your location is only used to search OpenStreetMap and is never stored or shared.
                </p>
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ════════════════════════════════════════════
       ROOT APP
    ════════════════════════════════════════════ */
    function App() {
      const [page, setPage] = useState('home');
      const [compareList, setCompare] = useState([]);
      const toast = useToast();
      const osm = useOSMSearch();

      const handleSearch = useCallback(async (city, type, lat, lon, useCoords = false) => {
        if (useCoords && lat && lon) {
          await osm.searchByCoords(lat, lon, city || 'Your Location', type === 'all' ? '' : type);
        } else if (lat && lon) {
          await osm.searchByCoords(lat, lon, city, type === 'all' ? '' : type);
        } else {
          await osm.search(city, type === 'all' ? '' : type);
        }
        if (page === 'home') setPage('hospitals');
      }, [osm, page]);

      const handleCompare = useCallback((h) => {
        setCompare(prev => {
          if (prev.some(c => c.id === h.id)) {
            toast.show(`Removed "${h.name}" from comparison`);
            return prev.filter(c => c.id !== h.id);
          }
          if (prev.length >= 3) { toast.show('Max 3 hospitals for comparison'); return prev; }
          toast.show(`Added "${h.name}" to comparison`);
          return [...prev, h];
        });
      }, [toast]);

      const NAV = [
        { key: 'home', label: 'Home', icon: '🏠' },
        { key: 'hospitals', label: 'Hospitals', icon: '🏥' },
        { key: 'nearest', label: 'Nearest', icon: '📍' },
        { key: 'map', label: 'Map', icon: '🗺️' },
        { key: 'compare', label: `Compare${compareList.length > 0 ? ` (${compareList.length})` : ''}`, icon: '⚖️' },
        { key: 'recommend', label: 'Recommend', icon: '🎯' },
      ];

      return (
        <>
          {/* NAVBAR */}
          <nav className="navbar">
            <div className="navbar-inner">
              <div className="brand" onClick={() => setPage('home')}>
                <div className="brand-icon">🏥</div>
                <div className="brand-name">Hospital<span>Finder</span></div>
              </div>
              <div className="nav-menu">
                {NAV.map(n => (
                  <button key={n.key}
                    className={`nav-btn ${page === n.key ? 'active' : ''}`}
                    onClick={() => setPage(n.key)}>
                    {n.icon} {n.label}
                  </button>
                ))}
              </div>
            </div>
          </nav>

          {/* PAGES */}
          {page === 'home' && <HomePage onSearch={handleSearch} loading={osm.loading} navigateTo={setPage} />}
          {page === 'hospitals' && <HospitalsPage osmHook={osm} onSearch={handleSearch} compareList={compareList} onCompare={handleCompare} loading={osm.loading} />}
          {page === 'nearest' && <NearestPage onSearch={handleSearch} loading={osm.loading} />}
          {page === 'map' && <MapPage osmHook={osm} onSearch={handleSearch} loading={osm.loading} />}
          {page === 'compare' && <ComparePage compareList={compareList} onClear={() => setCompare([])} onRemove={h => setCompare(p => p.filter(c => c.id !== h.id))} />}
          {page === 'recommend' && <RecommendPage osmHook={osm} onSearch={handleSearch} loading={osm.loading} />}

          {/* FOOTER */}
          <footer className="footer">
            <div className="footer-brand">Hospital<span>Finder</span> India</div>
            <div className="footer-links">
              {NAV.map(n => <a key={n.key} href="#" onClick={e => { e.preventDefault(); setPage(n.key) }}>{n.label}</a>)}
            </div>
            <p>Powered by <strong style={{ color: 'var(--emerald)' }}>OpenStreetMap</strong> & Overpass API · Data © OpenStreetMap contributors · Not a medical service</p>
          </footer>

          {/* TOAST */}
          <div className={`toast ${toast.visible ? 'show' : ''}`}>{toast.msg}</div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
